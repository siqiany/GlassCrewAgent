<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassCrewAgent - 智能问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .chat-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        input[type="text"]::placeholder {
            color: #666;
        }
        
        button {
            padding: 15px 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .message {
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid #00d4ff;
            margin-left: 20%;
        }
        
        .message.assistant {
            background: rgba(123, 44, 191, 0.1);
            border-left: 3px solid #7b2cbf;
            margin-right: 20%;
        }
        
        .message-label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .message.user .message-label {
            color: #00d4ff;
        }
        
        .message.assistant .message-label {
            color: #7b2cbf;
        }
        
        .message-content {
            line-height: 1.6;
        }
        
        .process-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }
        
        .status-indicator.running {
            background: #00d4ff;
            animation: pulse 1s infinite;
        }
        
        .status-indicator.completed {
            background: #00ff88;
        }
        
        .status-indicator.error {
            background: #ff4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .process-log {
            flex: 1;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
        }
        
        .log-item {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #444;
        }
        
        .log-item.agent_step {
            border-left-color: #00d4ff;
        }
        
        .log-item.task_start {
            border-left-color: #ffaa00;
        }
        
        .log-item.task_complete {
            border-left-color: #00ff88;
        }
        
        .log-item.error {
            border-left-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }
        
        .log-time {
            color: #666;
            font-size: 0.75rem;
            margin-right: 10px;
        }
        
        .log-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-right: 10px;
            font-weight: 600;
        }
        
        .log-type.agent_step {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        
        .log-type.task_start {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }
        
        .log-type.task_complete {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .log-type.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }
        
        .log-content {
            margin-top: 5px;
            color: #aaa;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .result-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        
        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        .result-content {
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: #00d4ff;
        }

        .tab-btn.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* Markdown rendering styles for result view */
        .markdown-body {
            line-height: 1.7;
            color: #e0e0e0;
            padding: 10px 0;
        }

        .markdown-body h1 {
            font-size: 2rem;
            color: #00d4ff;
            margin: 20px 0 15px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 10px;
        }

        .markdown-body h2 {
            font-size: 1.6rem;
            color: #00d4ff;
            margin: 18px 0 12px 0;
        }

        .markdown-body h3 {
            font-size: 1.3rem;
            color: #00d4ff;
            margin: 15px 0 10px 0;
        }

        .markdown-body p {
            margin-bottom: 15px;
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 15px;
            padding-left: 30px;
        }

        .markdown-body li {
            margin-bottom: 5px;
        }

        .markdown-body code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
        }

        .markdown-body blockquote {
            border-left: 4px solid #00d4ff;
            padding-left: 15px;
            color: #888;
            margin-bottom: 15px;
        }

        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 15px;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
        }

        .markdown-body th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .markdown-body a {
            color: #00d4ff;
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 8px;
        }

        /* Tool-specific log styles */
        .log-item.tool_start {
            border-left-color: #ffaa00;
        }

        .log-type.tool_start {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .log-item.tool_end {
            border-left-color: #00ff88;
            border-left-color: #00ff88;
        }

        .log-type.tool_end {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .process-log {
            flex: 1;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
            min-height: 400px;
        }
    </style>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 GlassCrewAgent</h1>
            <p class="subtitle">智能材料科学研究助手 - 实时显示智能体运行进程</p>
        </header>
        
        <div class="main-content">
            <div class="chat-section">
                <div class="input-area">
                    <input type="text" id="questionInput" placeholder="请输入您的问题，例如：帮我查找 SiO2 的性质..." onkeypress="handleKeyPress(event)">
                    <button id="submitBtn" onclick="submitQuestion()">提问</button>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <p>👋 您好！请在上方输入您的问题</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">
                            示例：<br>
                            • 查找二氧化硅的密度和晶体结构<br>
                            • 帮我搜索玻璃材料的最新研究论文<br>
                            • 查找 BaO 的光学性质
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="process-section">
                <div class="section-title">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span>运行状态</span>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('log')" id="tabLog">📋 运行日志</button>
                    <button class="tab-btn" onclick="switchTab('result')" id="tabResult">📝 结果查看</button>
                </div>

                <div class="tab-content active" id="logTab">
                    <div class="process-log" id="processLog">
                        <div class="empty-state">
                            <p>等待问题输入...</p>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="resultTab">
                    <div class="markdown-body" id="markdownResult">
                        <div class="empty-state">
                            <p>任务完成后结果将在这里显示</p>
                        </div>
                    </div>
                    <div class="download-section" id="downloadSection" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                        <p style="color: #888; font-size: 0.9rem; margin-bottom: 10px;">💾 报告已自动保存到服务器 output 目录，您也可以下载到本地：</p>
                        <button id="downloadBtn" onclick="downloadReport()" style="padding: 10px 20px; font-size: 0.9rem; background: linear-gradient(90deg, #00ff88, #00d4ff);">📥 下载 Markdown 报告</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
         let currentTaskId = null;
         let eventSource = null;
         let currentOutputFile = null;
         let currentResult = null;
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitQuestion();
            }
        }
        
        // 提交问题
        async function submitQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!question) {
                alert('请输入问题');
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '处理中...';
            
            // 添加用户消息
            addMessage('user', question);
            
            // 清空进程日志
            document.getElementById('processLog').innerHTML = '';
            document.getElementById('resultSection').style.display = 'none';
            updateStatus('running');
            
            try {
                // 发送请求
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    addMessage('assistant', '错误: ' + data.error);
                    updateStatus('error');
                } else {
                    currentTaskId = data.task_id;
                    // 连接 SSE 流
                    connectSSE(data.task_id);
                }
            } catch (error) {
                addMessage('assistant', '请求失败: ' + error.message);
                updateStatus('error');
            }
            
            // 启用按钮
            submitBtn.disabled = false;
            submitBtn.textContent = '提问';
            input.value = '';
        }
        
        // 连接 SSE 流
        function connectSSE(taskId) {
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource('/api/stream/' + taskId);
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleEvent(data);
            };
            
            eventSource.onerror = function() {
                eventSource.close();
                updateStatus('completed');
            };
        }
        
        // 处理事件
        function handleEvent(event) {
            const logContainer = document.getElementById('processLog');

            switch (event.type) {
                case 'agent_step':
                    addLogItem('agent_step',
                        `Agent: ${event.agent}`,
                        event.action || '',
                        event.input || '',
                        event.output || '');
                    break;

                case 'task_start':
                    addLogItem('task_start',
                        `任务开始: ${event.task}`);
                    break;

                case 'task_complete':
                    addLogItem('task_complete',
                        `任务完成: ${event.task}`);
                    break;

                case 'tool_start':
                    addLogItem('tool_start',
                        `工具调用: ${event.tool}`,
                        '',
                        event.input || '',
                        '');
                    break;

                case 'tool_end':
                    addLogItem('tool_end',
                        `工具完成: ${event.tool}`,
                        '',
                        '',
                        event.output || '');
                    break;

                 case 'complete':
                     // 保存结果和文件信息
                     currentResult = event.result;
                     currentOutputFile = event.output_file;

                     // 在结果标签页渲染Markdown
                     const markdownContainer = document.getElementById('markdownResult');
                     markdownContainer.innerHTML = marked.parse(event.result);
                     const emptyState = markdownContainer.querySelector('.empty-state');
                     if (emptyState) {
                         emptyState.style.display = 'none';
                     }

                     // 如果文件已保存，显示下载按钮
                     if (event.output_file) {
                         document.getElementById('downloadSection').style.display = 'block';
                     }

                     // 添加助手消息到聊天区
                     addMessage('assistant', '✅ 任务已完成，请切换到「结果查看」标签查看完整报告');

                     updateStatus('completed');
                     // 自动切换到结果标签
                     if (event.result) {
                         setTimeout(() => switchTab('result'), 500);
                     }
                     break;

                case 'error':
                    addLogItem('error', `错误: ${event.error}`);
                    addMessage('assistant', '处理出错: ' + event.error);
                    updateStatus('error');
                    break;

                case 'end':
                    if (eventSource) {
                        eventSource.close();
                    }
                    break;
            }
        }
        
        // 添加日志项
        function addLogItem(type, content, action = '', input = '', output = '') {
            const logContainer = document.getElementById('processLog');
            const time = new Date().toLocaleTimeString();
            
            let html = `<div class="log-item ${type}">`;
            html += `<span class="log-time">${time}</span>`;
            html += `<span class="log-type ${type}">${getTypeLabel(type)}</span>`;
            html += `<div class="log-content">${content}</div>`;
            
            if (action) {
                html += `<div class="log-content" style="color: #00d4ff;">Action: ${action}</div>`;
            }
            if (input) {
                html += `<div class="log-content" style="color: #ffaa00;">Input: ${input}</div>`;
            }
            if (output) {
                html += `<div class="log-content" style="color: #00ff88;">Output: ${output}</div>`;
            }
            
            html += '</div>';
            
            // 插入到日志区域
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            logContainer.innerHTML += html;
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // 获取类型标签
        function getTypeLabel(type) {
            const labels = {
                'agent_step': 'Agent',
                'task_start': '开始',
                'task_complete': '完成',
                'tool_start': '工具',
                'tool_end': '完成',
                'error': '错误'
            };
            return labels[type] || type;
        }

        // 切换标签
        function switchTab(tabName) {
            // 移除所有active
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // 添加active到选中标签
            if (tabName === 'log') {
                document.getElementById('tabLog').classList.add('active');
                document.getElementById('logTab').classList.add('active');
            } else {
                document.getElementById('tabResult').classList.add('active');
                document.getElementById('resultTab').classList.add('active');
            }
        }
        
        // 添加聊天消息
        function addMessage(role, content) {
            const messagesContainer = document.getElementById('chatMessages');
            
            // 移除空状态提示
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-label">${role === 'user' ? '👤 您' : '🤖 助手'}</div>
                <div class="message-content">${content}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
         // 更新状态指示器
         function updateStatus(status) {
             const indicator = document.getElementById('statusIndicator');
             indicator.className = 'status-indicator ' + status;
         }
         
         // 下载报告
         function downloadReport() {
             if (!currentResult) {
                 alert('没有可下载的结果');
                 return;
             }
             
             // 创建 Blob
             const blob = new Blob([currentResult], { type: 'text/markdown' });
             
             // 创建下载链接
             const url = URL.createObjectURL(blob);
             const a = document.createElement('a');
             
             // 生成文件名
             const timestamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
             a.download = `glass_report_${timestamp}.md`;
             a.href = url;
             
             // 触发下载
             document.body.appendChild(a);
             a.click();
             document.body.removeChild(a);
             URL.revokeObjectURL(url);
         }
    </script>
</body>
</html>

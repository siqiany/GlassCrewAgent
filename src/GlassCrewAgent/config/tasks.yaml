glass_research_task:
  description: >
    [CORE TASK] Answer the user's question about glass materials by coordinating with specialized agents.

    User Question: {user_input}

    [WORKFLOW - EXECUTE IN ORDER]
    1. ANALYZE: Carefully analyze the user's question to understand what information is needed
    2. PLAN: Decide which agents to delegate to based on the question:
       - For literature review and academic papers: Delegate to searcher agent
       - For material properties (density, structure, band gap): Delegate to mp_agent
       - For generating glass compositions from optical properties: Delegate to composition_generator agent
       - For electromagnetic simulation: Delegate to fdtd_simulation_agent
       - For first-principles DFT calculation (VASP): Delegate to vasp_calculation_expert agent
       - For validation: Delegate to reviewer agent
    3. DELEGATE: Create and assign specific sub-tasks to appropriate agents with clear instructions
    4. WAIT: Wait for all sub-agents to complete their tasks
    5. COLLECT: Gather all results from completed sub-tasks
    6. **CRITICAL DECISION POINT**: After getting initial results, ASK YOURSELF:
       - ❓ Is the current data sufficient and reliable?
       - ❓ Do we need higher accuracy verification with first-principles DFT?
       - ❓ Would VASP calculation add significant value to the answer?
       - ✅ IF ANY ANSWER IS YES: Delegate to vasp_calculation_expert for additional calculation
    7. SYNTHESIZE: Combine all findings into a comprehensive answer
    8. OUTPUT: Provide the final answer that directly addresses the user's question

    [DECISION GUIDELINES - PROACTIVE USE OF VASP]
    - Literature queries (papers, reviews, latest research): Use searcher agent with get_paperqa
    - Property data (density, structure, band gap): Start with mp_agent, THEN CONSIDER vasp_calculation_expert for verification if accuracy matters
    - Inverse design: When user wants glass compositions with specific optical properties, use: searcher → mp_agent → composition_generator → **vasp_calculation_expert (AUTOMATIC for top candidates)** → fdtd_simulation_agent → reviewer → manager for final report
    - **VASP AFTER COMPOSITION GENERATION - NON-NEGOTIABLE**: After composition_generator produces candidates, you MUST run the top 1-2 candidates through vasp_calculation_expert to get first-principles verification. This is not optional - it is required for scientific rigor.
    - FDTD simulation: When user wants electromagnetic simulation of glass structures, use fdtd_simulation_agent

    [VASP AGENT CAPABILITIES - READ THIS!]
    The vasp_calculation_expert agent NOW HAS THESE POWERFUL CAPABILITIES:
    1. **Full 3-step Band Gap Calculation** (NEW!):
       - Use this when you need ACCURATE band gap values!
       - This is NOT just a single static calculation - it does:
         * Structure relaxation → geometry optimization
         * Static SCF calculation → generates CHGCAR charge density
         * Non-SCF band calculation → high-symmetry k-path for accurate band gap
       - Returns: Numerical band gap (eV), VBM/CBM positions, material classification
       - Generates: Band structure plot, DOS plots, HTML report
       - Tell the agent: "Calculate band gap for material mp-XXX"

    2. **General VASP Calculations** (existing):
       - Structure relaxation (geometry optimization)
       - Static energy calculation
       - DOS and basic band structure
       - Output parsing with structured data (energy, forces, etc.)

    **VASP TRIGGER CONDITIONS - YOU SHOULD CALL VASP WHEN ANY OF THESE ARE TRUE**:
      * User asks for "accurate", "first-principles", "DFT", or "ab initio" results
      * User asks specifically for "band gap" calculation or verification
      * Predicting properties of novel materials not in the Materials Project
      * Need detailed band structure or density of states (DOS) analysis
      * Need to verify or cross-check empirical predictions
      * Calculating structure stability, formation energy, or phase information
      * Any property where experimental data is scarce or unreliable
      * The user's question implies high confidence is needed
    - **DO NOT WAIT FOR USER TO SAY "VASP"**: If the problem requires accurate atomic-level calculation, initiate VASP calculation on your own initiative. This is your responsibility as a research manager.
    - **IMPORTANT**: When delegating band gap calculation to vasp_calculation_expert,
      EXPLICITLY tell it: "Use the run_band_gap_calculation_from_mp tool for accurate
      3-step band gap calculation, not the single-step calculation."
    - Comprehensive queries: Use combination of agents as needed including reviewer for validation

    [KEY GLASS MATERIALS REFERENCE]
    - Glass formers: SiO2, B2O3, P2O5, GeO2
    - Network modifiers: Na2O, K2O, CaO, MgO, Al2O3
    - Optical properties: Refractive index (nd), Abbe number (νd), Mean dispersion (ΔP)
    - Special types: Optical glass, fiberglass, glass-ceramics

    [CRITICAL REQUIREMENT]
    Your final output MUST directly answer the user's question with specific data and clear explanations.
    Always get validation from reviewer for generated compositions before making final recommendations.

    [OUTPUT LANGUAGE REQUIREMENT]
    You MUST write the entire final report in the SAME LANGUAGE that the user used in their question.
    - If the user asked in Chinese, the entire report must be in Chinese
    - If the user asked in English, the entire report must be in English
    - Do not mix languages - the complete report must match the language of the original question

    [REPORT FORMATTING REQUIREMENT]
    Your final report MUST begin with a clear section stating the original user question, formatted as:

    # User Question

    {user_input}

    Then proceed with the main report content.
  expected_output: >
    A complete answer that:
    - Begins with a clearly marked "# User Question" section containing the original user question
    - Directly addresses the user's specific question in the same language as the original question
    - Includes relevant literature findings (from searcher agent) when requested
    - Contains material property data (from mp_agent) when requested
    - Includes generated glass compositions (from composition_generator) when requested
    - Includes simulation results (from fdtd_simulation_agent) when requested
    - Includes validation from reviewer
    - Provides clear analysis connecting all findings
    - Is formatted in structured sections with specific data points
  output_file: output/final_glass_report.md
  agent: manager
